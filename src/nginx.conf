server {
    listen 80;
    server_name 217.114.15.80 иэо.рф xn--d1a0a.xn--p1ai;

    root /var/www/ivo/build;
    index index.html;

    # Логи
    access_log /var/log/nginx/ivo_access.log;
    error_log /var/log/nginx/ivo_error.log;

    # Gzip сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Статические файлы с кешированием
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Все остальные запросы на index.html для React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
